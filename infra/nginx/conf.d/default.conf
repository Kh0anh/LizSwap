# ============================================================
# LizSwap – Nginx Virtual Host Configuration
# ============================================================
# Hỗ trợ cả HTTP (development) và HTTPS (production với Certbot)
# ============================================================

# -----------------------------------------------------------
# Upstream definitions
# -----------------------------------------------------------
upstream dapp_upstream {
    server dapp:3001;
}

upstream admin_upstream {
    server admin:3002;
}

upstream backend_upstream {
    server backend:3000;
}

# -----------------------------------------------------------
# HTTP → HTTPS redirect (production)
# Uncomment block này khi đã có SSL certificate
# -----------------------------------------------------------
