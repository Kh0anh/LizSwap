# ============================================================
# LizSwap – Docker Compose (Development)
# ============================================================
# Override docker-compose.yml cho môi trường development.
# - Hot-reload cho backend, indexer, dapp, admin
# - Mount source code vào container
# - Expose DB/Redis ports cho debug tools
#
# Sử dụng:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# Hoặc shortcut:
#   docker compose --profile dev up -d
# ============================================================

services:
  # ===========================================================
  # PostgreSQL – Expose port cho development tools (pgAdmin, DBeaver)
  # ===========================================================
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  # ===========================================================
  # Redis – Expose port cho redis-cli / Redis Insight
  # ===========================================================
  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

  # ===========================================================
  # Backend API – Dev mode với hot-reload
  # ===========================================================
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./packages/backend/src:/app/src:ro
      - ./packages/backend/package.json:/app/package.json:ro
      - ./packages/backend/tsconfig.json:/app/tsconfig.json:ro
    environment:
      NODE_ENV: development
    ports:
      - "3000:3000"
    command: npm run dev

  # ===========================================================
  # BSC Indexer – Dev mode với hot-reload
  # ===========================================================
  indexer:
    build:
      context: ./packages/indexer
      dockerfile: Dockerfile.dev
    volumes:
      - ./packages/indexer/src:/app/src:ro
      - ./packages/indexer/package.json:/app/package.json:ro
      - ./packages/indexer/tsconfig.json:/app/tsconfig.json:ro
    environment:
      NODE_ENV: development
    command: npm run dev

  # ===========================================================
  # DApp Frontend – Dev mode với hot-reload (Next.js Fast Refresh)
  # ===========================================================
  dapp:
    build:
      context: ./apps/dapp
      dockerfile: Dockerfile.dev
    volumes:
      - ./apps/dapp/src:/app/src:ro
      - ./apps/dapp/public:/app/public:ro
      - ./apps/dapp/package.json:/app/package.json:ro
      - ./apps/dapp/next.config.ts:/app/next.config.ts:ro
      - ./apps/dapp/tailwind.config.ts:/app/tailwind.config.ts:ro
      - ./apps/dapp/tsconfig.json:/app/tsconfig.json:ro
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost/api
      NEXT_PUBLIC_WS_URL: ws://localhost/socket.io
      NEXT_PUBLIC_FACTORY_ADDR: ${NEXT_PUBLIC_FACTORY_ADDR}
      NEXT_PUBLIC_ROUTER_ADDR: ${NEXT_PUBLIC_ROUTER_ADDR}
      NEXT_PUBLIC_STAKING_ADDR: ${NEXT_PUBLIC_STAKING_ADDR}
      NEXT_PUBLIC_CHAIN_ID: ${NEXT_PUBLIC_CHAIN_ID:-97}
    ports:
      - "3001:3001"
    command: npm run dev

  # ===========================================================
  # Admin Dashboard – Dev mode với hot-reload
  # ===========================================================
  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile.dev
    volumes:
      - ./apps/admin/src:/app/src:ro
      - ./apps/admin/public:/app/public:ro
      - ./apps/admin/package.json:/app/package.json:ro
      - ./apps/admin/next.config.ts:/app/next.config.ts:ro
      - ./apps/admin/tailwind.config.ts:/app/tailwind.config.ts:ro
      - ./apps/admin/tsconfig.json:/app/tsconfig.json:ro
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost/api
      NEXT_PUBLIC_WS_URL: ws://localhost/socket.io
      NEXT_PUBLIC_FACTORY_ADDR: ${NEXT_PUBLIC_FACTORY_ADDR}
      NEXT_PUBLIC_ROUTER_ADDR: ${NEXT_PUBLIC_ROUTER_ADDR}
      NEXT_PUBLIC_STAKING_ADDR: ${NEXT_PUBLIC_STAKING_ADDR}
      NEXT_PUBLIC_CHAIN_ID: ${NEXT_PUBLIC_CHAIN_ID:-97}
    ports:
      - "3002:3002"
    command: npm run dev

  # ===========================================================
  # Nginx – Vẫn cần để proxy API/WebSocket
  # ===========================================================
  nginx:
    ports:
      - "80:80"
      # Không cần 443 cho dev
