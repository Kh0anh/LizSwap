# ============================================================
# LizSwap – Docker Compose
# ============================================================
# Orchestrate toàn bộ hệ thống LizSwap:
#   - PostgreSQL 15 (database)
#   - Redis 7 (cache + JWT blacklist)
#   - Backend API (Node.js + Express + Socket.IO)
#   - BSC Indexer (Node.js daemon)
#   - DApp Frontend (Next.js SSR)
#   - Admin Dashboard (Next.js SSR)
#   - Nginx (reverse proxy + TLS termination)
#   - Certbot (SSL certificate auto-renewal)
#
# Smart Contracts đã deploy thủ công bằng Foundry.
# Chỉ cần cấu hình contract addresses trong .env
#
# Sử dụng:
#   cp .env.example .env    # Điền thông tin
#   docker compose up -d    # Khởi chạy
#   docker compose logs -f  # Xem logs
# ============================================================

services:
  # ===========================================================
  # PostgreSQL – Database chính
  # ===========================================================
  postgres:
    image: postgres:15-alpine
    container_name: lizswap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lizswap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lizswap_secret_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-lizswap}
    volumes:
      # Data persistence
      - postgres_data:/var/lib/postgresql/data
      # Init schema (chạy tự động lần đầu)
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      # Chỉ expose cho development. Production nên comment dòng này.
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - lizswap-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lizswap} -d ${POSTGRES_DB:-lizswap}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===========================================================
  # Redis – Cache + JWT Blacklist + Pub/Sub
  # ===========================================================
  redis:
    image: redis:7-alpine
    container_name: lizswap-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      # Chỉ expose cho development. Production nên comment dòng này.
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - lizswap-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================
  # Backend API – REST + WebSocket (Socket.IO)
  # ===========================================================
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: lizswap-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql://lizswap:lizswap_secret_change_me@postgres:5432/lizswap}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      BSC_RPC_URL: ${BSC_RPC_URL}
      BSC_RPC_WS: ${BSC_RPC_WS}
      BSC_CHAIN_ID: ${BSC_CHAIN_ID:-97}
      FACTORY_ADDR: ${FACTORY_ADDR}
      ROUTER_ADDR: ${ROUTER_ADDR}
      STAKING_ADDR: ${STAKING_ADDR}
      WBNB_ADDR: ${WBNB_ADDR}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      PORT: 3000
    networks:
      - lizswap-network
    # Không expose port ra ngoài – chỉ Nginx truy cập nội bộ

  # ===========================================================
  # BSC Indexer – Daemon lắng nghe events on-chain
  # ===========================================================
  indexer:
    build:
      context: ./packages/indexer
      dockerfile: Dockerfile
    container_name: lizswap-indexer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql://lizswap:lizswap_secret_change_me@postgres:5432/lizswap}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      BSC_RPC_URL: ${BSC_RPC_URL}
      BSC_RPC_WS: ${BSC_RPC_WS}
      BSC_CHAIN_ID: ${BSC_CHAIN_ID:-97}
      FACTORY_ADDR: ${FACTORY_ADDR}
      ROUTER_ADDR: ${ROUTER_ADDR}
      STAKING_ADDR: ${STAKING_ADDR}
      WBNB_ADDR: ${WBNB_ADDR}
      INDEXER_POLL_INTERVAL_MS: ${INDEXER_POLL_INTERVAL_MS:-2000}
      INDEXER_START_BLOCK: ${INDEXER_START_BLOCK:-latest}
    networks:
      - lizswap-network
    # Daemon – không expose port

  # ===========================================================
  # DApp Frontend – Next.js SSR (Swap, Pool, Stake, Chart)
  # ===========================================================
  dapp:
    build:
      context: ./apps/dapp
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
        NEXT_PUBLIC_FACTORY_ADDR: ${NEXT_PUBLIC_FACTORY_ADDR}
        NEXT_PUBLIC_ROUTER_ADDR: ${NEXT_PUBLIC_ROUTER_ADDR}
        NEXT_PUBLIC_STAKING_ADDR: ${NEXT_PUBLIC_STAKING_ADDR}
        NEXT_PUBLIC_CHAIN_ID: ${NEXT_PUBLIC_CHAIN_ID:-97}
    container_name: lizswap-dapp
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - lizswap-network
    # Không expose port ra ngoài – chỉ Nginx truy cập nội bộ

  # ===========================================================
  # Admin Dashboard – Next.js SSR (Manager & Staff)
  # ===========================================================
  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
        NEXT_PUBLIC_FACTORY_ADDR: ${NEXT_PUBLIC_FACTORY_ADDR}
        NEXT_PUBLIC_ROUTER_ADDR: ${NEXT_PUBLIC_ROUTER_ADDR}
        NEXT_PUBLIC_STAKING_ADDR: ${NEXT_PUBLIC_STAKING_ADDR}
        NEXT_PUBLIC_CHAIN_ID: ${NEXT_PUBLIC_CHAIN_ID:-97}
    container_name: lizswap-admin
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - lizswap-network
    # Không expose port ra ngoài – chỉ Nginx truy cập nội bộ

  # ===========================================================
  # Nginx – Reverse Proxy + TLS Termination
  # ===========================================================
  nginx:
    image: nginx:alpine
    container_name: lizswap-nginx
    restart: unless-stopped
    depends_on:
      - dapp
      - admin
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      # Certbot volumes
      - ./infra/certbot/conf:/etc/letsencrypt:ro
      - ./infra/certbot/www:/var/www/certbot:ro
    networks:
      - lizswap-network

  # ===========================================================
  # Certbot – SSL Certificate Auto-Renewal
  # ===========================================================
  certbot:
    image: certbot/certbot
    container_name: lizswap-certbot
    volumes:
      - ./infra/certbot/conf:/etc/letsencrypt
      - ./infra/certbot/www:/var/www/certbot
    # Auto-renew mỗi 12 giờ
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

# ===========================================================
# Networks
# ===========================================================
networks:
  lizswap-network:
    driver: bridge
    name: lizswap-network

# ===========================================================
# Volumes (persistent data)
# ===========================================================
volumes:
  postgres_data:
    name: lizswap-postgres-data
  redis_data:
    name: lizswap-redis-data
